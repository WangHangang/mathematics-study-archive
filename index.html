<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#153b34"><title>数学学习档案室</title><link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23153b34%22/><text x=%2232%22 y=%2247%22 text-anchor=%22middle%22 font-size=%2248%22 fill=%22%23d27748%22>∫</text></svg>"><style>
:root{--g:#153b34;--c:#f4f0e8;--o:#d27748;--m:#66746f;--l:#d8d1c5}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,var(--g) 0 25%,var(--c) 25%);color:var(--g);font-family:ui-serif,"Noto Serif SC","Songti SC",serif;min-height:100vh}main{width:min(980px,calc(100% - 32px));margin:48px auto;background:#fff;border-top:4px solid var(--o);padding:54px 64px;box-shadow:0 22px 70px #09231c22}.top{display:flex;justify-content:space-between;gap:24px}.brand{display:flex;gap:16px;align-items:center}.mark{font-size:62px;line-height:.8;color:var(--o)}.brand strong{font-size:22px;letter-spacing:.08em}.brand small{display:block;font:600 10px sans-serif;letter-spacing:.16em;color:var(--m);margin-top:6px}.lang{border:1px solid var(--l);border-radius:30px;padding:5px;height:max-content}.lang button{border:0;background:none;padding:7px 12px;border-radius:20px;color:var(--m)}.lang .active{background:var(--g);color:#fff}.hero{margin:70px 0 44px}.kick{color:var(--o);font:13px sans-serif;letter-spacing:.08em}.hero h1{font-size:50px;font-weight:500;margin:18px 0 12px}.hero p{font-size:17px;line-height:1.8;color:#526761}.section{margin-top:46px}.section header{display:flex;justify-content:space-between;align-items:end;border-bottom:1px solid var(--l);padding-bottom:14px}.section h2{font-size:28px;margin:0}.count{font:13px sans-serif;color:var(--m)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-top:18px}.card{border:1px solid var(--l);padding:22px}.card .meta{font:12px sans-serif;color:var(--o);letter-spacing:.04em}.card h3{font-size:20px;margin:12px 0 8px}.card p{color:var(--m);line-height:1.65;margin:0}.tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}.tags span{background:#eef2ef;padding:5px 8px;font:11px sans-serif}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}.actions a{background:var(--g);color:#fff;text-decoration:none;padding:9px 12px;font:13px sans-serif}.actions a.alt{background:#fff;color:var(--g);border:1px solid var(--g)}.empty,.error{padding:28px;border:1px solid var(--l);color:var(--m);margin-top:18px}footer{margin-top:54px;border-top:1px solid var(--l);padding-top:20px;font:12px sans-serif;color:var(--m)}@media(max-width:700px){main{margin:0;width:100%;padding:34px 22px}.top{display:block}.lang{margin-top:24px;width:max-content}.hero{margin-top:50px}.hero h1{font-size:38px}.grid{grid-template-columns:1fr}}
</style></head><body><main><div class="top"><div class="brand"><span class="mark">∫</span><div><strong data-zh="数学学习档案室" data-en="Mathematics Study Archive">数学学习档案室</strong><small>MATHEMATICS STUDY ARCHIVE</small></div></div><nav class="lang"><button class="active" data-lang="zh">中文</button><button data-lang="en">English</button></nav></div><section class="hero"><div class="kick">PUBLIC MIRROR · AUTO-SYNCED</div><h1 data-zh="公开学习资料" data-en="Public study materials">公开学习资料</h1><p data-zh="由档案室后台选择公开内容；镜像定时同步，并独立保存可公开资料。" data-en="Public items are selected in the archive admin and periodically synchronized here.">由档案室后台选择公开内容；镜像定时同步，并独立保存可公开资料。</p></section><div id="content"><div class="empty">正在读取公开目录…</div></div><footer>∫ Mathematics Study Archive · GitHub Mirror · <span id="updated">等待同步</span></footer></main><script>
let lang='zh',data=null;document.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{lang=b.dataset.lang;document.documentElement.lang=lang==='zh'?'zh-CN':'en';document.querySelectorAll('[data-lang]').forEach(x=>x.classList.toggle('active',x===b));document.querySelectorAll('[data-zh]').forEach(x=>x.textContent=x.dataset[lang]);render()});
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function docCard(d){return `<article class="card"><div class="meta">${esc(d.category)} · ${esc(d.date)}</div><h3>${esc(d.title)}</h3><p>${esc(d.subtitle||d.description)}</p><div class="tags">${(d.topics||[]).slice(0,5).map(x=>`<span>${esc(x)}</span>`).join('')}</div><div class="actions"><a href="${esc(d.pdf)}" target="_blank">${lang==='zh'?'打开 PDF':'Open PDF'}</a>${d.alternatePdf?`<a class="alt" href="${esc(d.alternatePdf)}" target="_blank">${esc(d.alternateLabel||'Other version')}</a>`:''}</div></article>`}
function questionCard(q){return `<article class="card"><div class="meta">${esc(q.number)} · ${esc(q.category)}</div><h3>${esc(lang==='en'&&q.englishTitle?q.englishTitle:q.title)}</h3><p>${esc(q.excerpt)}</p><div class="tags">${(q.tags||[]).slice(0,5).map(x=>`<span>${esc(x)}</span>`).join('')}</div></article>`}
function render(){if(!data)return;const docs=data.documents||[],qs=data.questions||[];document.querySelector('#content').innerHTML=`<section class="section"><header><h2>${lang==='zh'?'PDF 文档':'PDF documents'}</h2><span class="count">${docs.length}</span></header>${docs.length?`<div class="grid">${docs.map(docCard).join('')}</div>`:`<div class="empty">${lang==='zh'?'暂无公开文档':'No public documents'}</div>`}</section><section class="section"><header><h2>${lang==='zh'?'问题与整理':'Questions and notes'}</h2><span class="count">${qs.length}</span></header>${qs.length?`<div class="grid">${qs.map(questionCard).join('')}</div>`:`<div class="empty">${lang==='zh'?'暂无公开问题':'No public questions'}</div>`}</section>`;document.querySelector('#updated').textContent=(lang==='zh'?'同步于 ':'Synced ')+new Date(data.generatedAt).toLocaleString()}
fetch('./content.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw Error();return r.json()}).then(x=>{data=x;render()}).catch(()=>document.querySelector('#content').innerHTML='<div class="error">公开目录尚未完成首次同步，请稍后刷新。</div>');
</script></body></html>
